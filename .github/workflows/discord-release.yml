name: Discord Release Notification

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          RELEASE_NAME: ${{ github.event.release.name }}
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request

          webhook = os.environ['DISCORD_WEBHOOK']
          tag = os.environ['RELEASE_TAG']
          url = os.environ['RELEASE_URL']
          name = os.environ.get('RELEASE_NAME', tag)

          payload = {
            "embeds": [{
              "title": f"Mojo Gaming Mode {tag}",
              "description": f"A new version of Mojo Gaming Mode is available.",
              "url": url,
              "color": 7843072,
              "fields": [
                {"name": "Download", "value": f"[Get the installer]({url})", "inline": True},
                {"name": "Repository", "value": "[mojouto3/mojo-gaming-mode](https://github.com/mojouto3/mojo-gaming-mode)", "inline": True}
              ],
              "footer": {"text": "mojomultimedia"}
            }]
          }

          data = json.dumps(payload).encode('utf-8')
          req = urllib.request.Request(webhook, data=data, headers={'Content-Type': 'application/json'})
          urllib.request.urlopen(req)
          print('Discord notification sent')
          PYEOF
