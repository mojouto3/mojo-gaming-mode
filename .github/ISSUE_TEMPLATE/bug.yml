name: Bug report
description: Report something that isn't working correctly
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: false
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: App version
      placeholder: e.g. v1.9.0
    validations:
      required: true
  - type: dropdown
    id: gpu
    attributes:
      label: GPU vendor
      options:
        - NVIDIA
        - AMD
        - Intel
        - Not sure
    validations:
      required: false
